name: Auto-close pull requests

# このリポジトリは Pull Request を受け付けていません。
# 開いた PR は自動的にコメントを残して close します。
# 詳細: CONTRIBUTING.md

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## ⚠ Pull Request は受け付けていません',
              '',
              'ご対応ありがとうございます。',
              'しかしながら、このリポジトリは現在 **Pull Request を受け付けていません**。',
              '開発は内部リポジトリで進めており、本リポジトリにはリリース版のみが反映される運用になっています。',
              '',
              'いただいたフィードバックは [Issue](https://github.com/quarka-org/qa-assistants/issues/new/choose) で挙げ直していただけると、内部での対応検討に進めます。',
              '',
              '詳細は [CONTRIBUTING.md](https://github.com/quarka-org/qa-assistants/blob/main/CONTRIBUTING.md) を参照してください。',
              '',
              '---',
              '',
              'Thank you for your contribution. However, this repository does **not accept pull requests**.',
              '',
              'Please open an [Issue](https://github.com/quarka-org/qa-assistants/issues/new/choose) instead.',
              '',
              'See [CONTRIBUTING.md](https://github.com/quarka-org/qa-assistants/blob/main/CONTRIBUTING.md) for details.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
